behaviors:
  MoveToGoal:
    trainer_type: ppo
    hyperparameters:
      batch_size: 256
      buffer_size: 8192
      learning_rate: 1.0e-4
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.99
      num_epoch: 3
      learning_rate_schedule: linear
      beta_schedule: constant
      epsilon_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 128
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
      gail:
        strength: 0.3
        demo_path: Demos/DemoAgentClimb25_2.demo
        use_actions: true
    behavioral_cloning:
      strength: 0.3
      demo_path: Demos/DemoAgentClimb25_2.demo
      steps: 500000
    max_steps: 3000000
    time_horizon: 256
    summary_freq: 10000